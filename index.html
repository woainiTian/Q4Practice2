<body>
        <h1>Switch Statement</h1>

        <script>
            let team = "Yellow"; //start by declaring a variable and give it a value.

            switch (team){
                
                case "Yellow": 
                alert("Go Yellow Tiger!");
                break; 
                //the variable is a string, so the case is also string.

                case "Blue": 
                alert("Go Blue Bears!");
                break; 

                case "Red": 
                alert("Go Red Bulldogs..");
                break; 

                case "Green": 
                alert("Go Green Hornetsas!");
                break;     
                
                default:
                    alert("Team could not be determined.")
                //shows up when no match.b 
            }
        </script>



</body>

</html>
